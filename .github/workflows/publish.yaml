name: publish

on:
    release:
        types: [published]

permissions:
    contents: write
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.repository.default_branch }}

            - uses: denoland/setup-deno@v2

            - name: Publish and bump package
              run: deno run -A --min-dep-age 0 jsr:@msrass/scripts@0.1.2/jsr-publish

